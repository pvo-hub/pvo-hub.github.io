<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVO HUB</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

header{
background:#0B1F3A;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:12px;
margin-bottom:20px;
font-size:16px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.add-btn{
position:fixed;
right:20px;
bottom:20px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#0B1F3A;
color:white;
font-size:18px;
cursor:pointer;
}

footer{
background:#0B1F3A;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>
<body>

<header>
<h1>PVO HUB</h1>
<p>Рейтинг представителей владельцев облигаций</p>
</header>

<div class="container">

<h2>Каталог ПВО</h2>

<input
class="search"
placeholder="Поиск ПВО..."
>

<div id="cards"></div>

</div>

<button class="add-btn">
➕ Добавить ПВО
</button>

<footer>
© PVO HUB
</footer>

<script>

const pvos = [];

function renderCards(){

const cards =
document.getElementById("cards");

cards.innerHTML = "";

pvos.forEach(pvo=>{

cards.innerHTML += `
<div class="card">

<h3>${pvo.name}</h3>

<p>
Рейтинг:
${pvo.rating}
</p>

<p>
Прогноз:
${pvo.outlook}
</p>

</div>
`;

});

}

renderCards();

</script>

</body>
</html>
